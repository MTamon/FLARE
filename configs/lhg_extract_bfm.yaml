# FLARE LHG 頭部特徴量抽出設定 (Deep3DFaceRecon / BFM ルート)
#
# 使用例:
#   uv run python tool.py lhg-extract \
#       --path ./data/multimodal_dialogue_formed \
#       --output ./data/movements \
#       --config configs/lhg_extract_bfm.yaml
#
# 設計ドキュメント:
#   - docs/design/lhg_extract_pipeline.md
#   - docs/design/interpolation.md
#   - docs/design/rotation_interpolation.md

pipeline:
  name: lhg_extract_bfm
  fps: 30
  device: cuda:0

extractor:
  type: deep3d
  model_path: ./checkpoints/deep3d_epoch20.pth
  input_size: 224
  return_keys:
    - id
    - exp
    - pose

device_map:
  extractor: cuda:0
  lhg_model: cuda:0
  renderer: cuda:0

logging:
  level: INFO
  file: ./logs/lhg_extract_bfm.log
  rotation: 10 MB

lhg_extract:
  interpolation:
    # 線形空間特徴量 (expression / centroid) の補間手法。
    # "linear": 線形補間 (既定)
    # "pchip":  Fritsch-Carlson PCHIP (scipy 要)
    linear_order: linear

    # 回転特徴量 (angle) の補間手法。
    # "slerp":  球面線形補間 (既定、SO(3) 短弧選択)
    # "linear": 軸角空間線形補間 (レガシー互換)
    rotation_order: slerp

    # 補間を許容する最大ギャップ秒数。これを超える欠損はシーケンス境界として分割。
    max_gap_sec: 0.4

  sequence:
    # 採用する最小シーケンス長 (フレーム数)。
    min_length: 100

  normalization:
    # 対話 (動画ファイル) 単位で mean/std を計算。
    scope: sequence

  output:
    # 出力ファイル名プレフィックス。
    # Deep3DFaceRecon は BFM 係数のため "bfm" を使用 (旧実装互換)。
    prefix: bfm

    # シーケンス内 shape (id) 係数の集約方法。
    shape_aggregation: median
