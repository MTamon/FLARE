# FLARE リアルタイムパイプライン設定 (FLAME ルート: DECA + FlashAvatar)
#
# 使用例:
#   python examples/realtime_extract.py \
#       --config configs/realtime_flame.yaml \
#       --source 0
#
# 詳細: docs/guide_realtime.md

pipeline:
  name: realtime_flame
  fps: 30
  device: cuda:0
  converter_chain:
    # MediaPipe 補完を有効化したい場合は use_mediapipe_supplement: true を指定。
    # DECA は本来 eyes_pose / eyelids を出力しないため、このフラグが ON のとき
    # パイプラインが MediaPipe Face Landmarker から推定した値を Adapter に注入する。
    # SMIRK ルートに切り替える場合は type: smirk_to_flash_avatar に変更する
    # (SMIRK は eyelid をネイティブ出力するため、フラグの制御対象は eyes_pose のみ)。
    - type: deca_to_flash_avatar
      use_mediapipe_supplement: false

extractor:
  type: deca
  model_path: ./checkpoints/deca/deca_model.tar
  input_size: 224
  return_keys:
    - shape
    - exp
    - pose
    - cam
  repo_dir: ./third_party/DECA  # MTamon/DECA@cuda128 サブモジュール

renderer:
  type: flash_avatar
  model_path: ./checkpoints/flashavatar/
  source_image: null  # FlashAvatar はソース画像不要
  output_size: [512, 512]
  repo_dir: ./third_party/FlashAvatar  # MTamon/FlashAvatar@release/cuda128-fixed サブモジュール

lhg_model:
  type: learning2listen
  model_path: ./checkpoints/l2l/l2l_vqvae.pth
  window_size: 64
  codebook_size: 256

audio:
  sample_rate: 16000
  feature_type: mel
  n_mels: 128

buffer:
  max_size: 256
  timeout_sec: 0.5
  overflow_policy: drop_oldest

device_map:
  extractor: cuda:0
  lhg_model: cuda:0
  renderer: cuda:0

logging:
  level: INFO
  file: ./logs/realtime_flame.log
  rotation: 10 MB
